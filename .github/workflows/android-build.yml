name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Instalar Workloads de MAUI
      run: dotnet workload install maui-android wasm-tools --ignore-failed-sources

    - name: Restaurar dependencias
      # Añadimos el flag para ignorar el error de soporte de .NET 8
      run: dotnet restore EtiquetadoAuto.csproj -p:CheckEolTargetFramework=false

    - name: Compilar APK (Release)
      # También añadimos el flag aquí
      run: dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:RuntimeIdentifier=android-arm64 -p:StaticWebAssetsEnabled=true -p:CheckEolTargetFramework=false

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/*.apk