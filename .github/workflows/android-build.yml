name: Compilar App Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CheckEolTargetFramework: false
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.403' # Versión específica estable

    - name: Instalar Workloads de MAUI
      run: dotnet workload install maui-android wasm-tools --ignore-failed-sources

    - name: Restaurar dependencias
      run: dotnet restore EtiquetadoAuto.csproj

    - name: Compilar APK (Release)
      run: dotnet publish EtiquetadoAuto.csproj -f net8.0-android -c Release -p:RuntimeIdentifier=android-arm64 -p:StaticWebAssetsEnabled=true

    - name: Guardar el archivo APK
      uses: actions/upload-artifact@v4
      with:
        name: LogisticaVision-APK
        path: |
          **/bin/Release/net8.0-android/publish/*.apk
          **/*.apk